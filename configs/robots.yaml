# 机械臂配置

robots:
  R1:
    name: "上料定位机械臂"
    model: DOBOT CR5
    position: [0.3, -0.5, 0]
    home_pose: [0, 0, 0, 0, 0, 0]
    capabilities: [feed, unload, pick_and_place]
    end_effector: gripper
    work_area: [feed_area, unload_area]

  R2:
    name: "元件装配机械臂"
    model: DOBOT CR5
    position: [0.3, 0.5, 0]
    home_pose: [0, 0, 0, 0, 0, 0]
    capabilities: [assemble, pick_and_place]
    end_effector: small_gripper
    work_area: [assembly_area]

  R3:
    name: "锁付检测机械臂"
    model: DOBOT CR5
    position: [0.8, 0, 0]
    home_pose: [0, 0, 0, 0, 0, 0]
    capabilities: [screw, inspect]
    end_effector: screwdriver_and_camera
    work_area: [screw_area, inspect_area]

  R4:
    name: "分拣返修机械臂"
    model: DOBOT CR5
    position: [1.1, 0, 0]
    home_pose: [0, 0, 0, 0, 0, 0]
    capabilities: [sort_good, sort_defect, rework]
    end_effector: gripper
    work_area: [sort_area, rework_area]
    note: "根据 R3 检测结果分拣良品/不良品，空闲时可拆解不良品返修"
