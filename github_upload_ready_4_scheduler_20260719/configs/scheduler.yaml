# Scheduler configuration for the five-CR5A electrical control box cell.

scheduler:
  strategy: dynamic
  region_lock: true

  # Orders with priority >= 5 are treated as urgent orders.
  urgent_threshold: 5

  # The five robots are fixed-role resources in the current scene.
  cross_type_reassign: false

  # CAMERA produces OK/NG at inspect, but R5 sorting is created only after R4 screw.
  sort_trigger_process: screw

  scoring:
    priority_weight: 0.45
    due_weight: 0.30
    waiting_weight: 0.15
    critical_path_weight: 0.10
    bottleneck_penalty_weight: 0.05
    area_conflict_penalty_weight: 0.03
    bottleneck_resources: [R3]
    conflict_sensitive_areas: [inspection_platform_area]
    urgent_threshold: 5
    aging_horizon: 30
    urgency_horizon: 60
    critical_horizon: 60

  areas:
    box_supply_area:
      lock_required: true
      max_robots: 1
    terminal_supply_area:
      lock_required: true
      max_robots: 1
    pcb_supply_area:
      lock_required: true
      max_robots: 1
    module_supply_area:
      lock_required: true
      max_robots: 1
    assembly_fixture:
      lock_required: true
      max_robots: 1
    transfer_area:
      lock_required: true
      max_robots: 1
    inspection_screw_area:
      lock_required: true
      max_robots: 1
    inspection_platform_area:
      lock_required: true
      max_robots: 1
    camera_area:
      lock_required: true
      max_robots: 1
    good_conveyor_area:
      lock_required: true
      max_robots: 1
    defect_conveyor_area:
      lock_required: true
      max_robots: 1
    shared_transfer_area:
      lock_required: true
      max_robots: 2

experiment:
  baseline:
    description: "Serial baseline: finish one order before the next"
    strategy: fifo
    region_lock: false
  parallel_fifo:
    description: "Parallel FIFO baseline with the same area locks"
    strategy: fifo
    region_lock: true
  proposed:
    description: "Dynamic scoring with urgency, due date, waiting aging and area locks"
    strategy: dynamic
    region_lock: true
