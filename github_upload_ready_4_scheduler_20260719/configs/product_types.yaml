# Product process templates aligned with the Five CR5A cell.
# Each product unit is expanded into a DAG by scheduler/task_generator.py.

A:
  name: "A type small electrical control box"
  processes:
    - process: box_feed
      area: box_supply_area
      point: R1_BOX_PLACE_TCP
      available_robots: [R1]
      duration: 6
      required_areas: [box_supply_area, assembly_fixture]
      scene_done_cmd: R1_BOX_PLACED
    - process: pcb_install
      area: pcb_supply_area
      point: R2_PCB_PLACE_TCP
      available_robots: [R2]
      duration: 8
      required_areas: [pcb_supply_area, assembly_fixture]
      scene_done_cmd: R2_PCB_PLACED
    - process: module_install
      area: module_supply_area
      point: R3_MODULE_PLACE_TCP
      available_robots: [R3]
      duration: 7
      required_areas: [module_supply_area, assembly_fixture]
      scene_done_cmd: R3_MODULE_PLACED
    - process: terminal_install
      area: terminal_supply_area
      point: R1_TERMINAL_PLACE_TCP
      available_robots: [R1]
      duration: 7
      required_areas: [terminal_supply_area, assembly_fixture]
      scene_done_cmd: R1_TERMINAL_PLACED
    - process: transfer_to_inspection
      area: transfer_area
      point: R3_PRODUCT_PLACE_INSPECTION_TCP
      available_robots: [R3]
      duration: 8
      required_areas: [assembly_fixture, inspection_platform_area]
      scene_done_cmd: R3_PRODUCT_TO_INSPECTION
    - process: inspect
      area: camera_area
      point: CAMERA_INSPECTION_CENTER
      available_robots: [CAMERA]
      duration: 5
      required_areas: [inspection_platform_area, camera_area]
      scene_done_cmd: CAMERA_GOOD_OR_DEFECT
    - process: screw
      area: inspection_screw_area
      point: R4_SCREW_PRESS
      available_robots: [R4]
      duration: 9
      required_areas: [inspection_screw_area, inspection_platform_area]
      scene_done_cmd: R4_SCREW_DONE
  component_count: 4
  screw_count: 4
  inspection_points: 1

