post_inspection:
  - process: sort_good
    area: good_conveyor_area
    point: R5_GOOD_PLACE_TCP
    available_robots: [R5]
    duration: 5
    condition: "inspect_result == OK"
    required_areas: [inspection_platform_area, good_conveyor_area]
    scene_done_cmd: R5_SORT_GOOD_DONE
  - process: sort_defect
    area: defect_conveyor_area
    point: R5_DEFECT_PLACE_TCP
    available_robots: [R5]
    duration: 5
    condition: "inspect_result == NG"
    required_areas: [inspection_platform_area, defect_conveyor_area]
    scene_done_cmd: R5_SORT_DEFECT_DONE
