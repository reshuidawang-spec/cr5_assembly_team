<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720">
  <defs>
    <style>
      .title{font:700 26px Arial,"Noto Sans CJK SC",sans-serif;fill:#111827}
      .label{font:600 17px Arial,"Noto Sans CJK SC",sans-serif;fill:#111827}
      .text{font:14px Arial,"Noto Sans CJK SC",sans-serif;fill:#374151}
      .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
      .blue{fill:#eef6ff;stroke:#2563eb;stroke-width:2;rx:8}
      .green{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:8}
      .orange{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:8}
      .red{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:8}
      .arrow{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#64748b;stroke-width:2;stroke-dasharray:7 6;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="1180" height="720" fill="#ffffff"/>
  <text x="34" y="48" class="title">图4  五向测针标定误差补偿完整流程</text>

  <rect x="55" y="100" width="190" height="78" class="blue"/>
  <text x="86" y="130" class="label">1 几何先验</text>
  <text x="78" y="158" class="text">p_b0, R_p, 分支方向</text>

  <rect x="300" y="100" width="190" height="78" class="blue"/>
  <text x="325" y="130" class="label">2 人工粗采</text>
  <text x="322" y="158" class="text">标准球触发数据</text>

  <rect x="545" y="100" width="190" height="78" class="green"/>
  <text x="566" y="130" class="label">3 距离粗标定</text>
  <text x="578" y="158" class="text">求 C_s, p_b 初值</text>

  <rect x="790" y="100" width="190" height="78" class="green"/>
  <text x="817" y="130" class="label">4 法向路径生成</text>
  <text x="823" y="158" class="text">a_i = normalize(...)</text>

  <rect x="55" y="260" width="190" height="78" class="orange"/>
  <text x="89" y="290" class="label">5 安全筛查</text>
  <text x="75" y="318" class="text">可达性 / 碰撞裕度</text>

  <rect x="300" y="260" width="190" height="78" class="orange"/>
  <text x="336" y="290" class="label">6 自动精采</text>
  <text x="322" y="318" class="text">低速短行程触碰</text>

  <rect x="545" y="260" width="190" height="78" class="green"/>
  <text x="573" y="290" class="label">7 方向精标定</text>
  <text x="578" y="318" class="text">鲁棒求解 C_s, p_b</text>

  <rect x="790" y="260" width="190" height="78" class="red"/>
  <text x="822" y="290" class="label">8 异常剔除</text>
  <text x="811" y="318" class="text">残差 / 过行程 / 碰撞</text>

  <rect x="55" y="420" width="190" height="78" class="green"/>
  <text x="82" y="450" class="label">9 残差数据集</text>
  <text x="84" y="478" class="text">x_i -> e_i</text>

  <rect x="300" y="420" width="190" height="78" class="green"/>
  <text x="326" y="450" class="label">10 GPR 训练</text>
  <text x="322" y="478" class="text">均值 μ 与方差 Σ</text>

  <rect x="545" y="420" width="190" height="78" class="orange"/>
  <text x="573" y="450" class="label">11 主动补采</text>
  <text x="568" y="478" class="text">U_GP + det(J'J)</text>

  <rect x="790" y="420" width="190" height="78" class="blue"/>
  <text x="817" y="450" class="label">12 工件测量</text>
  <text x="812" y="478" class="text">触发点在线补偿</text>

  <rect x="1020" y="420" width="120" height="78" class="blue"/>
  <text x="1042" y="450" class="label">输出</text>
  <text x="1035" y="478" class="text">点坐标 + U</text>

  <path d="M245 139 L300 139" class="arrow"/>
  <path d="M490 139 L545 139" class="arrow"/>
  <path d="M735 139 L790 139" class="arrow"/>
  <path d="M885 178 C885 220 150 220 150 260" class="arrow"/>
  <path d="M245 299 L300 299" class="arrow"/>
  <path d="M490 299 L545 299" class="arrow"/>
  <path d="M735 299 L790 299" class="arrow"/>
  <path d="M885 338 C885 385 150 380 150 420" class="arrow"/>
  <path d="M245 459 L300 459" class="arrow"/>
  <path d="M490 459 L545 459" class="arrow"/>
  <path d="M735 459 L790 459" class="arrow"/>
  <path d="M980 459 L1020 459" class="arrow"/>
  <path d="M640 420 C640 370 340 365 190 338" class="dash"/>
  <path d="M545 459 C420 590 230 565 150 498" class="dash"/>

  <text x="120" y="620" class="text">虚线表示闭环：异常剔除后重新求解，或 GPR 不确定度高时主动补采。</text>
</svg>
