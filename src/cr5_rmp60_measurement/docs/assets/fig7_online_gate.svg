<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="650" viewBox="0 0 1120 650">
  <defs>
    <style>
      .title{font:700 26px Arial,"Noto Sans CJK SC",sans-serif;fill:#111827}
      .label{font:600 18px Arial,"Noto Sans CJK SC",sans-serif;fill:#111827}
      .text{font:15px Arial,"Noto Sans CJK SC",sans-serif;fill:#374151}
      .box{fill:#f8fafc;stroke:#334155;stroke-width:2;rx:8}
      .blue{fill:#eef6ff;stroke:#2563eb;stroke-width:2;rx:8}
      .green{fill:#f0fdf4;stroke:#16a34a;stroke-width:2;rx:8}
      .orange{fill:#fff7ed;stroke:#ea580c;stroke-width:2;rx:8}
      .red{fill:#fef2f2;stroke:#dc2626;stroke-width:2;rx:8}
      .arrow{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
      .yes{stroke:#16a34a;stroke-width:2.4;fill:none;marker-end:url(#arrowG)}
      .no{stroke:#dc2626;stroke-width:2.4;fill:none;marker-end:url(#arrowR)}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#334155"/>
    </marker>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#16a34a"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="1120" height="650" fill="#ffffff"/>
  <text x="34" y="48" class="title">图7  在线补偿与不确定度门控</text>

  <rect x="60" y="130" width="180" height="82" class="blue"/>
  <text x="94" y="162" class="label">工件触发</text>
  <text x="84" y="190" class="text">branch, F_i, R_i</text>

  <rect x="315" y="130" width="190" height="82" class="blue"/>
  <text x="344" y="162" class="label">原始点计算</text>
  <text x="340" y="190" class="text">P_raw = F_i + R_i p_b</text>

  <rect x="580" y="130" width="190" height="82" class="green"/>
  <text x="610" y="162" class="label">GPR 推理</text>
  <text x="604" y="190" class="text">μ_GP(x), Σ_GP(x)</text>

  <polygon points="860,120 980,171 860,222 740,171" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <text x="810" y="166" class="label">U(x) ≤ 阈值?</text>
  <text x="834" y="193" class="text">可信域判断</text>

  <rect x="840" y="300" width="215" height="95" class="green"/>
  <text x="884" y="335" class="label">高置信输出</text>
  <text x="874" y="365" class="text">P_corrected</text>
  <text x="874" y="390" class="text">模型版本 / 置信度</text>

  <rect x="550" y="300" width="215" height="95" class="red"/>
  <text x="598" y="335" class="label">低置信处理</text>
  <text x="580" y="365" class="text">提示补采或降级</text>
  <text x="580" y="390" class="text">禁止自动高置信出具</text>

  <rect x="250" y="455" width="235" height="95" class="orange"/>
  <text x="300" y="490" class="label">主动补采</text>
  <text x="285" y="520" class="text">选择安全且高信息量姿态</text>

  <path d="M240 171 L315 171" class="arrow"/>
  <path d="M505 171 L580 171" class="arrow"/>
  <path d="M770 171 L740 171" class="arrow"/>
  <path d="M920 222 L940 300" class="yes"/>
  <text x="945" y="266" class="text">是</text>
  <path d="M800 215 L690 300" class="no"/>
  <text x="712" y="252" class="text">否</text>
  <path d="M620 395 C560 460 500 500 485 502" class="arrow"/>
  <path d="M250 502 C145 500 120 250 150 212" class="arrow"/>
  <text x="76" y="575" class="text">低置信样本不直接作为高可信测量结果，优先进入补采闭环。</text>
</svg>
