<svg xmlns="http://www.w3.org/2000/svg" width="980" height="720" viewBox="0 0 980 720">
  <defs>
    <style>
      .title{font:700 26px Arial,"Noto Sans CJK SC",sans-serif;fill:#111827}
      .label{font:600 18px Arial,"Noto Sans CJK SC",sans-serif;fill:#111827}
      .text{font:15px Arial,"Noto Sans CJK SC",sans-serif;fill:#374151}
      .small{font:13px Arial,"Noto Sans CJK SC",sans-serif;fill:#4b5563}
      .panel{fill:#ffffff;stroke:#cbd5e1;stroke-width:2;rx:10}
      .branch{stroke:#2563eb;stroke-width:9;stroke-linecap:round}
      .stem{stroke:#64748b;stroke-width:10;stroke-linecap:round}
      .ball{fill:#ef4444;stroke:#991b1b;stroke-width:2.2}
      .origin{fill:#ffffff;stroke:#111827;stroke-width:2.2}
      .dash{stroke:#16a34a;stroke-width:2.2;stroke-dasharray:8 6;fill:none}
      .axis{stroke:#334155;stroke-width:2.4;marker-end:url(#arrow)}
      .note{fill:#f8fafc;stroke:#334155;stroke-width:1.8;rx:8}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#334155"/>
    </marker>
  </defs>
  <rect width="980" height="720" fill="#ffffff"/>
  <text x="34" y="48" class="title">图2  五向测针分支独立几何模型</text>

  <rect x="55" y="85" width="530" height="520" class="panel"/>
  <text x="78" y="122" class="label">俯视图：四个横向分支</text>
  <circle cx="320" cy="345" r="30" class="origin"/>
  <text x="252" y="390" class="text">分支公共名义起点</text>

  <line x1="320" y1="345" x2="505" y2="345" class="branch"/>
  <line x1="320" y1="345" x2="135" y2="345" class="branch"/>
  <line x1="320" y1="345" x2="320" y2="160" class="branch"/>
  <line x1="320" y1="345" x2="320" y2="530" class="branch"/>

  <circle cx="505" cy="345" r="20" class="ball"/>
  <circle cx="135" cy="345" r="20" class="ball"/>
  <circle cx="320" cy="160" r="20" class="ball"/>
  <circle cx="320" cy="530" r="20" class="ball"/>

  <text x="530" y="350" class="label">x_pos</text>
  <text x="62" y="350" class="label">x_neg</text>
  <text x="292" y="135" class="label">y_pos</text>
  <text x="292" y="570" class="label">y_neg</text>

  <path d="M320 345 L505 345" class="dash"/>
  <path d="M320 345 L320 160" class="dash"/>
  <path d="M320 345 L135 345" class="dash"/>
  <path d="M320 345 L320 530" class="dash"/>
  <text x="395" y="328" class="small">p_x_pos</text>
  <text x="335" y="240" class="small">p_y_pos</text>

  <line x1="90" y1="555" x2="155" y2="555" class="axis"/>
  <line x1="90" y1="555" x2="90" y2="490" class="axis"/>
  <text x="165" y="561" class="label">X</text>
  <text x="82" y="480" class="label">Y</text>

  <rect x="625" y="85" width="300" height="300" class="panel"/>
  <text x="648" y="122" class="label">侧视图：轴向 z 分支</text>
  <rect x="715" y="150" width="120" height="48" fill="#e2e8f0" stroke="#475569" stroke-width="2" rx="8"/>
  <text x="742" y="181" class="text">机器人法兰</text>
  <line x1="775" y1="198" x2="775" y2="275" class="stem"/>
  <circle cx="775" cy="292" r="24" class="origin"/>
  <line x1="775" y1="292" x2="775" y2="355" class="branch"/>
  <circle cx="775" cy="372" r="20" class="ball"/>
  <text x="803" y="378" class="label">z</text>
  <path d="M775 292 L775 372" class="dash"/>
  <text x="795" y="335" class="small">p_z</text>
  <line x1="670" y1="350" x2="720" y2="350" class="axis"/>
  <line x1="670" y1="350" x2="670" y2="300" class="axis"/>
  <text x="730" y="356" class="label">X/Y</text>
  <text x="662" y="291" class="label">Z</text>

  <rect x="625" y="430" width="300" height="175" class="note"/>
  <text x="650" y="465" class="label">建模关系</text>
  <text x="650" y="500" class="text">B = {z, x_pos, x_neg, y_pos, y_neg}</text>
  <text x="650" y="530" class="text">P_i,b = F_i + R_i p_b</text>
  <text x="650" y="560" class="text">p_b = p_b0 + delta_b</text>
  <text x="650" y="590" class="text">不同分支不共用同一 TCP</text>
</svg>
