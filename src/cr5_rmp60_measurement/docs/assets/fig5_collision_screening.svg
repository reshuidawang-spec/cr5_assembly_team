<svg xmlns="http://www.w3.org/2000/svg" width="980" height="640" viewBox="0 0 980 640">
  <defs>
    <style>
      .title{font:700 26px Arial,"Noto Sans CJK SC",sans-serif;fill:#111827}
      .label{font:600 18px Arial,"Noto Sans CJK SC",sans-serif;fill:#111827}
      .text{font:15px Arial,"Noto Sans CJK SC",sans-serif;fill:#374151}
      .std{fill:#dbeafe;stroke:#1d4ed8;stroke-width:3}
      .target{fill:#dcfce7;stroke:#16a34a;stroke-width:3}
      .bad{fill:#fee2e2;stroke:#dc2626;stroke-width:3}
      .stem{stroke:#475569;stroke-width:9;stroke-linecap:round}
      .safe{stroke:#16a34a;stroke-width:3;fill:none;marker-end:url(#arrowG)}
      .risk{stroke:#dc2626;stroke-width:3;fill:none;stroke-dasharray:8 6;marker-end:url(#arrowR)}
      .box{fill:#f8fafc;stroke:#334155;stroke-width:1.8;rx:8}
    </style>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#16a34a"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0 0 L10 5 L0 10z" fill="#dc2626"/>
    </marker>
  </defs>
  <rect width="980" height="640" fill="#ffffff"/>
  <text x="34" y="48" class="title">图5  横向分支异常触发与路径安全筛查</text>

  <circle cx="590" cy="330" r="115" class="std"/>
  <text x="560" y="330" class="label">标准球</text>

  <line x1="270" y1="330" x2="430" y2="330" class="stem"/>
  <line x1="350" y1="250" x2="350" y2="410" class="stem"/>
  <circle cx="430" cy="330" r="24" class="target"/>
  <circle cx="350" cy="250" r="18" class="bad"/>
  <circle cx="350" cy="410" r="18" class="bad"/>
  <circle cx="270" cy="330" r="18" class="bad"/>
  <text x="385" y="303" class="label">目标分支</text>
  <text x="204" y="302" class="text">非目标分支</text>
  <text x="316" y="222" class="text">非目标球</text>

  <path d="M330 560 C360 470 390 400 430 330" class="safe"/>
  <text x="250" y="558" class="label">安全法向路径</text>
  <path d="M350 90 C350 160 350 210 350 250" class="risk"/>
  <text x="250" y="92" class="label">高风险 z 向下压</text>

  <rect x="690" y="90" width="240" height="145" class="box"/>
  <text x="715" y="124" class="label">筛查指标</text>
  <text x="715" y="156" class="text">1. 目标球最近接触</text>
  <text x="715" y="183" class="text">2. 测杆/外壳最小裕度</text>
  <text x="715" y="210" class="text">3. 起点-目标段采样检测</text>

  <rect x="690" y="430" width="240" height="125" class="box"/>
  <text x="715" y="464" class="label">异常样本特征</text>
  <text x="715" y="496" class="text">残差大、方向不一致</text>
  <text x="715" y="523" class="text">过行程异常或裕度不足</text>
</svg>
