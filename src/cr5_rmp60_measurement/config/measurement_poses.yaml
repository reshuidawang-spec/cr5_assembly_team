# Standard measurement poses for real CR5 probing.
#
# Units:
# - flange_orientation_deg is Dobot MovL rx/ry/rz in degrees.
# - approach vectors are in the robot base frame.
#
# The first cross-stylus pose below is based on the real X- touch validated on
# 2026-05-22. It is a practical working pose for the current hardware setup,
# not a final calibrated TCP definition.

cross_probe:
  x_neg_y_neg_verified:
    description: "Cross stylus y_neg branch probing a workpiece face along base X-."
    status: verified
    branch: y_neg
    approach: [-1.0, 0.0, 0.0]
    flange_orientation_deg: [-175.2180, -0.4330, 123.3110]
    source: "2026-05-22 real X- 5mm touch; DI1 triggered and released."
    contact_csv: "data/cross_probe_contacts.csv"
  x_neg_y_neg_operator_approved_20260525:
    description: "Operator-aligned y_neg branch probing the registered current workpiece face along base X-; one limited real touch has triggered DI1."
    status: operator_approved_validation
    branch: y_neg
    approach: [-1.0, 0.0, 0.0]
    flange_orientation_deg: [-176.9814, 3.0476, 149.7910]
    source: "2026-05-25 operator confirmed same y_neg ball is aligned with X- face and X- 5mm / X+ 2mm path is safe; one registered real touch triggered DI1 with 0.8414mm Stop overtravel."
