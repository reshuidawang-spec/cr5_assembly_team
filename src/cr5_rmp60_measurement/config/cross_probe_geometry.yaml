# CR5 + RMP60 cross-stylus geometry.
#
# Units:
# - length fields are in millimetres unless the key suffix is `_m`.
# - vectors are expressed in the RMP60/tool local frame.
#
# Current assumptions from the provided flange drawing:
# - Adapter/flange effective axial length: 5 + 40 + 4.4 = 49.4 mm.
# - Each cross-stylus ball centre is 75 mm from the stylus branch origin.
# - "2.0 ball" is treated as ball diameter, so radius is 1.0 mm.

tool_frame: rmp60_probe_body
flange_adapter:
  plate_thickness_mm: 5.0
  main_body_length_mm: 40.0
  rmp60_mount_step_mm: 4.4
  effective_axial_length_mm: 49.4

probe_body:
  length_mm: 76.0
  diameter_mm: 63.0

derived_nominal:
  flange_to_branch_origin_mm: 125.4
  flange_to_axial_ball_center_mm: 209.27089775384175

stylus:
  branch_center_distance_mm: 75.0
  ball_diameter_mm: 2.0
  ball_radius_mm: 1.0
  rod_radius_mm: 1.5

branches:
  - name: z
    frame: rmp60_tip_z
    compatible_frame: rmp60_tip
    direction: [0.0, 0.0, 1.0]
    nominal_offset_mm: [0.0, 0.0, 83.87089775384175]
  - name: x_pos
    frame: rmp60_tip_x_pos
    direction: [1.0, 0.0, 0.0]
    nominal_offset_mm: [75.0, 0.0, 0.0]
  - name: x_neg
    frame: rmp60_tip_x_neg
    direction: [-1.0, 0.0, 0.0]
    nominal_offset_mm: [-75.0, 0.0, 0.0]
  - name: y_pos
    frame: rmp60_tip_y_pos
    direction: [0.0, 1.0, 0.0]
    nominal_offset_mm: [0.0, 75.0, 0.0]
  - name: y_neg
    frame: rmp60_tip_y_neg
    direction: [0.0, -1.0, 0.0]
    nominal_offset_mm: [0.0, -75.0, 0.0]
